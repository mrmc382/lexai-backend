<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none">
  <!-- Icon: stylized L + scales of justice -->
  <rect x="0" y="6" width="60" height="60" rx="12" fill="#1E3A8A"/>

  <!-- Letter L base -->
  <rect x="16" y="16" width="9" height="32" rx="2" fill="white"/>
  <rect x="16" y="39" width="22" height="9" rx="2" fill="white"/>

  <!-- Scales of justice (minimal) -->
  <!-- Center post -->
  <rect x="37.5" y="18" width="2.5" height="20" rx="1" fill="#93C5FD"/>
  <!-- Horizontal beam -->
  <rect x="30" y="18" width="17" height="2.5" rx="1" fill="#93C5FD"/>
  <!-- Left pan string -->
  <line x1="31.5" y1="20.5" x2="31.5" y2="30" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- Right pan string -->
  <line x1="45.5" y1="20.5" x2="45.5" y2="30" stroke="#93C5FD" stroke-width="1.5"/>
  <!-- Left pan -->
  <ellipse cx="31.5" cy="31" rx="4.5" ry="1.8" fill="#93C5FD"/>
  <!-- Right pan -->
  <ellipse cx="45.5" cy="31" rx="4.5" ry="1.8" fill="#93C5FD"/>

  <!-- Wordmark: LexAI -->
  <text x="76" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#1E3A8A" letter-spacing="-0.5">Lex</text>
  <text x="148" y="48" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#2563EB" letter-spacing="-0.5">AI</text>

  <!-- Tagline -->
  <text x="77" y="63" font-family="Arial, Helvetica, sans-serif" font-size="10.5" fill="#64748B" letter-spacing="2">ANÁLISIS INTELIGENTE DE CONTRATOS</text>
</svg>
